<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이브코딩 초보를 위한 개발환경 + 도우미 (4월 모임)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-lg mx-auto px-4 py-8">

    <!-- 헤더 -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">바이브코딩 초보를 위한<br>개발환경 + 도우미 (4월 모임)</h1>
      <p class="text-gray-500 text-sm">오프라인 소규모 모임 신청폼이에요</p>
    </div>

    <!-- 마감 안내 -->
    <div class="bg-white rounded-2xl shadow-sm p-8 text-center">
      <div class="text-5xl mb-4">&#128683;</div>
      <h2 class="text-xl font-bold text-gray-900 mb-3">4월 모임 신청이 마감되었습니다</h2>
      <p class="text-sm text-gray-600 mb-6">많은 관심 감사드려요!<br>다음 모임은 오픈채팅방에서 안내드릴게요.</p>

      <div class="bg-gray-50 rounded-xl p-5 mb-4">
        <p class="text-sm font-medium text-gray-800 mb-1">이미 신청하신 분은</p>
        <p class="text-sm text-gray-600">오픈채팅방에서 안내사항을 확인해 주세요!</p>
      </div>

      <p class="text-xs text-gray-400 mt-4">문의사항은 오픈채팅방에서 남겨주세요.</p>
    </div>

  </div>

  <!-- 마감 상태: 신청 기능 비활성화 -->

</body>
</html>
